name: Release - Tag from DTS-52074-Tag-dockerhub-push-github-actions + Optional Docker Hub Push

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: "Release tag/version to create (e.g., 16.1.0)"
        required: true
        type: string
      next_dev_version:
        description: "Next development version after tagging (e.g., 16.1.1-SNAPSHOT)"
        required: true
        type: string
      push_to_dockerhub:
        description: "Push Docker image to Docker Hub? push only during major and minor releases (e.g., 16.0.0 or 16.1.0), not for patch releases (e.g., 16.1.1)"
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

permissions:
  contents: write

env:
  IMAGE_NAME: psknowhow/knowhow-api
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }} # without .azurecr.io
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  tag_build_optional_push:
    name: Tag, Build, Optional Docker Hub Push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout DTS-52074-Tag-dockerhub-push-github-actions (full history for tagging)
        uses: actions/checkout@v4
        with:
          ref: DTS-52074-Tag-dockerhub-push-github-actions
          fetch-depth: 0

      - name: Set up Git identity (for commits/tags)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      # Optional: Configure Maven to use GitHub Packages (keep if you need private deps)
      - name: Configure Maven settings.xml for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.MAVEN_TOKEN }}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/PublicisSapient/knowhow-ai-gateway-client</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      # Optional: Clone & build knowhow-common if your build requires it
      - name: Clone & Build knowhow-common (optional dependency)
        run: |
          echo "Cloning knowhow-common branch Z"
          git clone --branch "${{ inputs.tag_version }}" https://github.com/PublicisSapient/knowhow-common.git
          cd knowhow-common

      - name: Set project version to release (tag_version)
        run: |
          mvn -B -ntp versions:set \
            -DnewVersion="${{ inputs.tag_version }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false

      - name: Commit release version change
        run: |
          git add -A
          git commit -m "chore(release): ${{ inputs.tag_version }}" || echo "No changes to commit"

      - name: Create annotated git tag
        run: |
          git tag -a "${{ inputs.tag_version }}" -m "Release ${{ inputs.tag_version }}"

      - name: Push commit + tag to origin/DTS-52074-Tag-dockerhub-push-github-actions
        run: |
          git push origin DTS-52074-Tag-dockerhub-push-github-actions
          git push origin "${{ inputs.tag_version }}"

      - name: Build jar (skip tests/sonar/unit tests)
        if: ${{ inputs.push_to_dockerhub == 'yes' }}
        run: |
          mvn -B -ntp clean package -DskipTests

      - name: Set up Docker Buildx
        if: ${{ inputs.push_to_dockerhub == 'yes' }}
        uses: docker/setup-buildx-action@v3

      - name: Docker login (Docker Hub) - only if push is yes
        if: ${{ inputs.push_to_dockerhub == 'yes' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and optionally push) Docker image to Docker Hub
        if: ${{ inputs.push_to_dockerhub == 'yes' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push_to_dockerhub == 'yes' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.tag_version }}

      - name: Bump to next development version (next_dev_version)
        run: |
          mvn -B -ntp versions:set \
            -DnewVersion="${{ inputs.next_dev_version }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false

      - name: Commit next development version bump
        run: |
          git add -A
          git commit -m "chore: bump version to ${{ inputs.next_dev_version }}" || echo "No changes to commit"

      - name: Push next development version commit to origin/DTS-52074-Tag-dockerhub-push-github-actions
        run: |
          git push origin DTS-52074-Tag-dockerhub-push-github-actions
